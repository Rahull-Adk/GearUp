services:
  db:
    image: mysql:8.0
    container_name: gearup-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    networks:
      - gearup_network
    volumes:
      - gearup_data:/var/lib/mysql
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        timeout: 20s
        retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5255:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Redis__ConnectionString: ${Redis__ConnectionString:-redis:6379}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Jwt__AccessToken_SecretKey: ${Jwt__AccessToken_SecretKey}
      Jwt__EmailVerificationToken_SecretKey: ${Jwt__EmailVerificationToken_SecretKey}
      BREVO_API_KEY: ${BREVO_API_KEY}
      FromEmail: ${FromEmail}
      ClientUrl: ${ClientUrl}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - db
      - redis
      - aspire-dashboard
    networks:
      - gearup_network
    restart: on-failure

  redis:
    image: redis:latest
    container_name: gearup-redis
    ports:
      - "6379:6379"
    networks:
      - gearup_network

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: aspire-dashboard
    restart: unless-stopped
    ports:
      - "18888:18888"   # UI
      - "4317:18889"    # OTLP gRPC (standard port)
      - "4318:18890"    # OTLP HTTP (standard port)
    networks:
      - gearup_network


volumes:
  gearup_data:

networks:
    gearup_network:




